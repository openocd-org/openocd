#
# NXP LX2160A - 16-core Arm Cortex-A72 QorIQ Layerscape SoC
#
# https://www.nxp.com/products/LX2160A
#

if { [info exists CHIPNAME] } {
	set _CHIPNAME $CHIPNAME
} else {
	set _CHIPNAME lx2160a
}

if { [info exists NUMCORES] } {
	set _NUMCORES $NUMCORES
} else {
	set _NUMCORES 16
}

if { [info exists DAP_TAPID] } {
	set _DAP_TAPID $DAP_TAPID
} else {
	set _DAP_TAPID 0x6ba00477
}

jtag newtap $_CHIPNAME dap -irlen 4 -expected-id $_DAP_TAPID
dap create $_CHIPNAME.dap -chain-position $_CHIPNAME.dap

set _TARGETNAME $_CHIPNAME.cpu
set _smp "target smp"

# implementation has 2 cores in each core complex
for {set cc 0} {$cc < $_NUMCORES / 2} {incr cc} {
	set core0 [format %x [expr {$cc * 2 + 0}]]
	set core1 [format %x [expr {$cc * 2 + 1}]]

	cti create $_CHIPNAME.cti.$core0 \
		-dap $_CHIPNAME.dap -ap-num 0 \
		-baseaddr [expr {0x1020000 + $cc * 0x400000}]
	target create $_CHIPNAME.cpu.$core0 aarch64 \
		-dap $_CHIPNAME.dap -ap-num 0 \
		-dbgbase [expr {0x1010000 + $cc * 0x400000}] \
		-cti $_CHIPNAME.cti.$core0
	cti create $_CHIPNAME.cti.$core1 \
		-dap $_CHIPNAME.dap -ap-num 0 \
		-baseaddr [expr {0x1120000 + $cc * 0x400000}]
	target create $_CHIPNAME.cpu.$core1 aarch64 \
		-dap $_CHIPNAME.dap -ap-num 0 \
		-dbgbase [expr {0x1110000 + $cc * 0x400000}] \
		-cti $_CHIPNAME.cti.$core1

	set _smp "$_smp $_CHIPNAME.cpu.$core0 $_CHIPNAME.cpu.$core1"

	unset core0
	unset core1
}

eval $_smp
targets lx2160a.cpu.0

# datasheet value, tested @ 15MHz
adapter speed 25000
